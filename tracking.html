<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracking Pesanan — Lifa Flora</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    .track-page {
      min-height: 100vh;
      background: var(--pink-bg);
      padding: 6rem 1rem 3rem;
    }

    .track-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .track-heading {
      margin-bottom: 2rem;
    }

    .track-heading .section-tag {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink-deep);
      margin-bottom: 0.4rem;
      display: block;
    }

    .track-heading h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text-dark);
    }

    .track-heading p {
      color: var(--text-light);
      font-size: 0.92rem;
      margin-top: 0.35rem;
    }

    /* Grid kartu pesanan */
    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.25rem;
    }

    /* Kartu pesanan */
    .track-card {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      transition: var(--transition);
    }

    .track-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .track-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .track-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .track-status {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.75rem;
      border-radius: var(--radius-full);
      white-space: nowrap;
    }

    .track-date {
      font-size: 0.82rem;
      color: var(--text-light);
    }

    .track-items {
      font-size: 0.88rem;
      color: var(--text-mid);
      line-height: 1.5;
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
      padding: 0.6rem 0;
    }

    .track-total {
      font-size: 0.92rem;
      color: var(--text-mid);
    }

    .track-total strong {
      color: var(--pink-deep);
    }

    /* Timeline status */
    .track-timeline {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 0.25rem 0;
    }

    .track-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      flex: 1;
      position: relative;
    }

    .track-step-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      z-index: 1;
      transition: var(--transition);
    }

    .track-step-dot.done {
      background: var(--pink-deep);
      border-color: var(--pink-deep);
      color: white;
    }

    .track-step-dot.active {
      background: var(--pink-light);
      border-color: var(--pink-deep);
      color: var(--pink-deep);
    }

    .track-step-label {
      font-size: 0.68rem;
      color: var(--text-light);
      text-align: center;
    }

    .track-step-label.done,
    .track-step-label.active {
      color: var(--pink-deep);
      font-weight: 600;
    }

    .track-line {
      flex: 1;
      height: 2px;
      background: var(--border);
      margin-bottom: 1.2rem;
      transition: var(--transition);
    }

    .track-line.done {
      background: var(--pink-deep);
    }

    /* Tombol update */
    .track-update-btn {
      width: 100%;
      padding: 0.65rem;
      background: var(--pink-deep);
      color: var(--white);
      border: none;
      border-radius: var(--radius-full);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }

    .track-update-btn:hover:not(:disabled) {
      background: #d4617a;
      transform: translateY(-1px);
    }

    .track-update-btn:disabled {
      background: var(--green-deep);
      cursor: default;
    }

    /* Empty state */
    .track-empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-light);
      display: none;
    }

    .track-empty span {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
    }

    .track-empty p {
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .track-empty-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 1.5rem;
      background: var(--pink-deep);
      color: var(--white);
      border-radius: var(--radius-full);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: var(--transition);
    }

    .track-empty-btn:hover {
      background: #d4617a;
    }

    /* Login reminder */
    .track-login-note {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      font-size: 0.88rem;
      color: var(--text-mid);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .track-login-note a {
      color: var(--pink-deep);
      font-weight: 500;
      text-decoration: none;
    }

    .track-login-note a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🌸</span>
        <span class="logo-text">Lifa <em>Flora</em></span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="index.html#products" class="nav-link">Produk</a></li>
        <li><a href="index.html#contact" class="nav-link">Kontak</a></li>
        <li><a href="tracking.html" class="nav-link active">Pesanan</a></li>
        <li id="navLoginItem"><a href="login.html" class="nav-link">Login</a></li>
        <li id="navUserItem" style="display:none;align-items:center;gap:0.5rem;">
          <a href="profile.html" class="nav-link" id="navUserName">👤 Akun</a>
          <button class="nav-link nav-logout-btn" onclick="logoutUser()" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:inherit;color:inherit;padding:0.4rem 0.75rem;">Keluar</button>
        </li>
      </ul>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===================== TRACKING PAGE ===================== -->
  <main class="track-page">
    <div class="track-container">

      <div class="track-heading">
        <span class="section-tag">Riwayat Belanja</span>
        <h1>Tracking Pesanan</h1>
        <p>Pantau status pesanan buketmu di sini</p>
      </div>

      <!-- Catatan login -->
      <div class="track-login-note" id="trackLoginNote" style="display:none;">
        💡 <span><a href="login.html">Login</a> agar pesananmu tersimpan dan bisa dipantau kapan saja.</span>
      </div>

      <!-- Empty state -->
      <div class="track-empty" id="trackEmpty">
        <span>📦</span>
        <p>Belum ada pesanan.<br/>Yuk pilih buket cantik dulu!</p>
        <a href="index.html#products" class="track-empty-btn">
          🌸 Lihat Koleksi
        </a>
      </div>

      <!-- Grid pesanan — diisi JS -->
      <div class="track-grid" id="trackGrid"></div>

    </div>
  </main>
  

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    lucide.createIcons();
    loadState();
    updateNavAuth();

    // Tampilkan catatan login jika belum login
    if (!getSession()) {
      document.getElementById('trackLoginNote').style.display = 'flex';
    }

    initTrackingPage();

    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
