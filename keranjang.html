<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keranjang — Lifa Flora</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    .kr-page {
      min-height: 100vh;
      background: var(--pink-bg);
      padding: 6rem 1rem 3rem;
    }

    .kr-container {
      max-width: 960px;
      margin: 0 auto;
    }

    .kr-heading {
      margin-bottom: 2rem;
    }

    .kr-heading .section-tag {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink-deep);
      margin-bottom: 0.4rem;
      display: block;
    }

    .kr-heading h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text-dark);
    }

    /* Layout dua kolom */
    .kr-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 720px) {
      .kr-layout { grid-template-columns: 1fr; }
    }

    /* Kartu utama */
    .kr-card {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .kr-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .kr-card-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-dark);
    }

    .kr-clear-btn {
      font-size: 0.8rem;
      color: #d4617a;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
    }

    .kr-clear-btn:hover { text-decoration: underline; }

    /* Item keranjang */
    .kr-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .kr-item:last-child { border-bottom: none; }
    .kr-item:hover { background: var(--pink-bg); }

    .kr-item-emoji {
      width: 56px;
      height: 56px;
      background: var(--pink-light);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .kr-item-info { flex: 1; min-width: 0; }

    .kr-item-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-dark);
      margin-bottom: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kr-item-cat {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-bottom: 0.35rem;
    }

    .kr-item-price {
      font-size: 0.88rem;
      color: var(--pink-deep);
      font-weight: 600;
    }

    /* Qty control */
    .kr-qty-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }

    .kr-qty-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--off-white);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      color: var(--text-dark);
    }

    .kr-qty-btn:hover { background: var(--pink-light); color: var(--pink-deep); }

    .kr-qty-num {
      width: 36px;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-dark);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      line-height: 32px;
    }

    /* Subtotal per item */
    .kr-item-subtotal {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-dark);
      min-width: 80px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Tombol hapus */
    .kr-del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      font-size: 1rem;
      padding: 0.25rem;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .kr-del-btn:hover { color: #d4617a; }

    /* Empty state */
    .kr-empty {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-light);
    }

    .kr-empty-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .kr-empty p { margin-bottom: 1.25rem; font-size: 0.95rem; }

    .kr-empty-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.7rem 1.5rem;
      background: var(--pink-deep);
      color: white;
      border-radius: var(--radius-full);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .kr-empty-btn:hover { background: #d4617a; transform: translateY(-1px); }

    /* ---- Sidebar ringkasan ---- */
    .kr-summary-card {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 1.5rem;
      position: sticky;
      top: 5.5rem;
    }

    .kr-summary-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--text-dark);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .kr-summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      color: var(--text-mid);
      margin-bottom: 0.55rem;
    }

    .kr-summary-row.total {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
      padding-top: 0.75rem;
      margin-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .kr-discount-val { color: var(--pink-deep); font-weight: 600; }

    /* Voucher input */
    .kr-voucher-wrap {
      display: flex;
      gap: 0.4rem;
      margin: 1rem 0;
    }

    .kr-voucher-input {
      flex: 1;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
      text-transform: uppercase;
    }

    .kr-voucher-input:focus {
      border-color: var(--pink-deep);
      box-shadow: 0 0 0 3px rgba(232,117,143,0.12);
    }

    .kr-voucher-btn {
      padding: 0.6rem 0.9rem;
      background: var(--pink-deep);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .kr-voucher-btn:hover { background: #d4617a; }

    .kr-voucher-status {
      font-size: 0.78rem;
      margin-bottom: 0.75rem;
      min-height: 1rem;
      color: var(--text-light);
    }

    .kr-voucher-status.success { color: var(--green-deep); }
    .kr-voucher-status.error   { color: #d4617a; }

    /* Checkout btn */
    .kr-checkout-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--pink-deep);
      color: white;
      border: none;
      border-radius: var(--radius-full);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      text-decoration: none;
    }

    .kr-checkout-btn:hover {
      background: #d4617a;
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .kr-checkout-btn:disabled {
      background: var(--text-light);
      cursor: not-allowed;
      transform: none;
    }

    .kr-continue-btn {
      width: 100%;
      padding: 0.7rem;
      background: transparent;
      color: var(--pink-deep);
      border: 1.5px solid var(--pink-deep);
      border-radius: var(--radius-full);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .kr-continue-btn:hover { background: var(--pink-light); }

    /* Badge jumlah item */
    .kr-item-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--pink-light);
      color: var(--pink-deep);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.65rem;
      border-radius: var(--radius-full);
      margin-left: 0.5rem;
    }

    /* Hint voucher */
    .kr-voucher-hint {
      font-size: 0.73rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🌸</span>
        <span class="logo-text">Lifa <em>Flora</em></span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="index.html#products" class="nav-link">Produk</a></li>
        <li><a href="index.html#contact" class="nav-link">Kontak</a></li>
        <li><a href="tracking.html" class="nav-link">Pesanan</a></li>
        <li id="navLoginItem"><a href="login.html" class="nav-link">Login</a></li>
        <li id="navUserItem" style="display:none;align-items:center;gap:0.5rem;">
          <a href="profile.html" class="nav-link" id="navUserName">👤 Akun</a>
          <button class="nav-link nav-logout-btn" onclick="logoutUser()" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:inherit;color:inherit;padding:0.4rem 0.75rem;">Keluar</button>
        </li>
      </ul>
      <button class="cart-btn" id="cartBtn" onclick="window.location.href='keranjang.html'">
        <i data-lucide="shopping-bag"></i>
        <span class="cart-count" id="cartCount">0</span>
      </button>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===================== KERANJANG PAGE ===================== -->
  <main class="kr-page">
    <div class="kr-container">

      <div class="kr-heading">
        <span class="section-tag">Belanjamu</span>
        <h1>Keranjang <span id="krItemBadge"></span></h1>
      </div>

      <div class="kr-layout">

        <!-- KIRI: Daftar item -->
        <div>
          <div class="kr-card">
            <div class="kr-card-header">
              <span class="kr-card-title">🛍️ Produk yang dipilih</span>
              <button class="kr-clear-btn" onclick="krClearCart()">🗑️ Kosongkan</button>
            </div>
            <div id="krItemList">
              <!-- diisi JS -->
            </div>
          </div>

          <!-- Rekomendasi lanjut belanja -->
          <div style="margin-top:1rem;font-size:0.85rem;color:var(--text-light);text-align:center;">
            Mau tambah lagi? <a href="index.html#products" style="color:var(--pink-deep);font-weight:500;">Lihat semua produk →</a>
          </div>
        </div>

        <!-- KANAN: Ringkasan & aksi -->
        <div>
          <div class="kr-summary-card">
            <div class="kr-summary-title">📋 Ringkasan Belanja</div>

            <div class="kr-summary-row">
              <span>Subtotal</span>
              <span id="krSubtotal">Rp 0</span>
            </div>
            <div class="kr-summary-row">
              <span>Diskon Voucher</span>
              <span class="kr-discount-val" id="krDiscount">-Rp 0</span>
            </div>
            <div class="kr-summary-row total">
              <span>Total</span>
              <span id="krTotal">Rp 0</span>
            </div>

            <!-- Voucher -->
            <div style="margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem;">
              <div class="kr-voucher-hint">🎟️ Punya kode voucher? Min. 2 produk.</div>
              <div class="kr-voucher-wrap">
                <input type="text" class="kr-voucher-input" id="krVoucherInput" placeholder="KODE VOUCHER" maxlength="20" />
                <button class="kr-voucher-btn" onclick="krApplyVoucher()">Pakai</button>
              </div>
              <div class="kr-voucher-status" id="krVoucherStatus"></div>
            </div>

            <!-- Tombol aksi -->
            <button class="kr-checkout-btn" id="krCheckoutBtn" onclick="krGoCheckout()">
              <i data-lucide="arrow-right"></i> Lanjut Checkout
            </button>
            <a href="index.html#products" class="kr-continue-btn">
              ← Lanjut Belanja
            </a>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script type="module">
    import { getProductsFromFirestore } from "./firebase-config.js";

    lucide.createIcons();

    async function initKeranjang() {
      await loadState();
      updateNavAuth();
      renderKeranjang();
      updateCartCount();
    }

    /* ===== RENDER KERANJANG ===== */
    function renderKeranjang() {
      const listEl      = document.getElementById("krItemList");
      const subtotalEl  = document.getElementById("krSubtotal");
      const discountEl  = document.getElementById("krDiscount");
      const totalEl     = document.getElementById("krTotal");
      const checkoutBtn = document.getElementById("krCheckoutBtn");
      const badgeEl     = document.getElementById("krItemBadge");

      if (!listEl) return;

      if (!cart.length) {
        listEl.innerHTML = `
          <div class="kr-empty">
            <div class="kr-empty-icon">🌿</div>
            <p>Keranjangmu masih kosong.<br/>Yuk pilih buket cantik dulu!</p>
            <a href="index.html#products" class="kr-empty-btn">🌸 Lihat Koleksi</a>
          </div>`;
        if (subtotalEl)  subtotalEl.textContent  = "Rp 0";
        if (discountEl)  discountEl.textContent  = "-Rp 0";
        if (totalEl)     totalEl.textContent     = "Rp 0";
        if (checkoutBtn) checkoutBtn.disabled    = true;
        if (badgeEl)     badgeEl.innerHTML       = "";
        return;
      }

      listEl.innerHTML = cart.map(item => {
        const subtotal = item.price * item.qty;
        const product  = products.find(p => p.id === item.id);
        const maxStock = Number(product?.stock ?? 99);
        return `
          <div class="kr-item" id="kr-item-${item.id}">
            <div class="kr-item-emoji">${item.emoji || "💐"}</div>
            <div class="kr-item-info">
              <div class="kr-item-name">${item.name}</div>
              <div class="kr-item-cat">${item.category || ""}</div>
              <div class="kr-item-price">${formatPrice(item.price)}</div>
            </div>
            <div class="kr-qty-wrap">
              <button class="kr-qty-btn" onclick="krChangeQty(${item.id}, -1)">−</button>
              <div class="kr-qty-num">${item.qty}</div>
              <button class="kr-qty-btn" onclick="krChangeQty(${item.id}, 1)" ${item.qty >= maxStock ? "disabled" : ""}>+</button>
            </div>
            <div class="kr-item-subtotal">${formatPrice(subtotal)}</div>
            <button class="kr-del-btn" onclick="krRemoveItem(${item.id})" title="Hapus">✕</button>
          </div>`;
      }).join("");

      const summary = getCartSummary();
      if (subtotalEl)  subtotalEl.textContent  = formatPrice(summary.subtotal);
      if (discountEl)  discountEl.textContent  = "-" + formatPrice(summary.discount);
      if (totalEl)     totalEl.textContent     = formatPrice(summary.total);
      if (checkoutBtn) checkoutBtn.disabled    = false;

      const totalQty = summary.totalItems;
      if (badgeEl) badgeEl.innerHTML = `<span class="kr-item-count-badge">${totalQty} item</span>`;
    }

    function krChangeQty(id, delta) {
      const item = cart.find(c => c.id === id);
      if (!item) return;
      const product  = products.find(p => p.id === id);
      const maxStock = Number(product?.stock ?? 99);
      item.qty = Math.max(1, Math.min(maxStock, Number(item.qty) + delta));
      localStorage.setItem(STORAGE_CART_PERSIST_KEY, JSON.stringify(cart));
      renderKeranjang();
      updateCartCount();
    }

    function krRemoveItem(id) {
      cart = cart.filter(c => c.id !== id);
      localStorage.setItem(STORAGE_CART_PERSIST_KEY, JSON.stringify(cart));
      renderKeranjang();
      updateCartCount();
      showToast("🗑️ Produk dihapus dari keranjang.");
    }

    function krClearCart() {
      if (!cart.length) return;
      if (!confirm("Kosongkan semua keranjang?")) return;
      cart = [];
      appliedVoucher = null;
      localStorage.setItem(STORAGE_CART_PERSIST_KEY, JSON.stringify(cart));
      renderKeranjang();
      updateCartCount();
      showToast("🗑️ Keranjang dikosongkan.");
    }

    function updateCartCount() {
      const total = cart.reduce((s, i) => s + Number(i.qty || 0), 0);
      const el = document.getElementById("cartCount");
      if (el) el.textContent = total;
    }

    function krApplyVoucher() {
      const code   = document.getElementById("krVoucherInput")?.value.trim().toUpperCase();
      const statusEl = document.getElementById("krVoucherStatus");
      if (!code) { statusEl.textContent = "Masukkan kode voucher dulu."; statusEl.className = "kr-voucher-status error"; return; }
      if (!vouchers[code]) {
        appliedVoucher = null;
        statusEl.textContent = "❌ Kode voucher tidak valid.";
        statusEl.className = "kr-voucher-status error";
      } else {
        appliedVoucher = { code };
        const summary = getCartSummary();
        if (summary.totalItems < 2) {
          statusEl.textContent = "⚠️ Voucher hanya berlaku untuk min. 2 produk.";
          statusEl.className = "kr-voucher-status error";
        } else {
          statusEl.textContent = `✅ Voucher ${code} aktif — hemat ${formatPrice(summary.discount)}!`;
          statusEl.className = "kr-voucher-status success";
        }
      }
      renderKeranjang();
    }

    function krGoCheckout() {
      if (!cart.length) { showToast("❗ Keranjangmu masih kosong!"); return; }
      window.location.href = "checkout.html";
    }

    /* Expose ke window */
    window.krChangeQty = krChangeQty;
    window.krRemoveItem = krRemoveItem;
    window.krClearCart = krClearCart;
    window.krApplyVoucher = krApplyVoucher;
    window.krGoCheckout = krGoCheckout;
    window.renderKeranjang = renderKeranjang;

    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });

    initKeranjang();
  </script>
</body>
</html>
